<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Accept Invite</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 24px; }
      .btn { display:inline-block; padding: 12px 16px; border-radius: 10px; background:#111; color:#fff; text-decoration:none; margin-right: 8px; }
      .muted { color:#555; }
      code { background:#f3f3f3; padding:2px 6px; border-radius:6px; }
    </style>
  </head>
  <body>
    <h1>Opening Hersey Home…</h1>
    <p class="muted">If the app doesn’t open, use the buttons below.</p>
    <p id="links"></p>

    <script>
      const params = new URLSearchParams(location.search);
      const token = params.get("token");
      if (!token) {
        document.body.innerHTML = "<h1>Invalid invite link</h1><p>No token found.</p>";
      } else {
        const appLink = `herseynetwork://invite?token=${encodeURIComponent(token)}`;
        const copyLink = `${location.origin}${location.pathname}?token=${encodeURIComponent(token)}`;
        document.getElementById("links").innerHTML = `
          <a class="btn" href="${appLink}">Open App</a>
          <a class="btn" href="${copyLink}">Reload</a>
          <p class="muted" style="margin-top:16px">Token: <code>${token}</code></p>
        `;
        // Attempt to open the app automatically
        window.location.href = appLink;
      }
    </script>
  </body>
</html>
